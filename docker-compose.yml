services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notebud-app
    restart: unless-stopped
    ports:
      - "8000:80"
    env_file:
      - .env
    volumes:
      - storage:/var/www/html/storage
    depends_on:
      - queue

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notebud-queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    env_file:
      - .env
    volumes:
      - storage:/var/www/html/storage

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notebud-migrate
    command: php artisan migrate --force
    env_file:
      - .env
    restart: "no"

volumes:
  storage:
