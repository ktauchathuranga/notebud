name: Aiven MySQL Keep-Alive

on:
  push:
    branches:
      - main
      - laravel
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  power-on:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Aiven CLI
        run: python -m pip install --upgrade pip aiven-client

      - name: Validate required secrets
        env:
          AIVEN_TOKEN: ${{ secrets.AIVEN_TOKEN }}
          AIVEN_PROJECT: ${{ secrets.AIVEN_PROJECT }}
          AIVEN_SERVICE: ${{ secrets.AIVEN_SERVICE }}
        run: |
          set -e
          test -n "$AIVEN_TOKEN" || (echo "Missing secret: AIVEN_TOKEN" && exit 1)
          test -n "$AIVEN_PROJECT" || (echo "Missing secret: AIVEN_PROJECT" && exit 1)
          test -n "$AIVEN_SERVICE" || (echo "Missing secret: AIVEN_SERVICE" && exit 1)

      - name: Power on MySQL service
        env:
          AIVEN_TOKEN: ${{ secrets.AIVEN_TOKEN }}
          AIVEN_PROJECT: ${{ secrets.AIVEN_PROJECT }}
          AIVEN_SERVICE: ${{ secrets.AIVEN_SERVICE }}
        run: |
          avn --auth-token "$AIVEN_TOKEN" service update "$AIVEN_SERVICE" \
            --project "$AIVEN_PROJECT" \
            --power-on

      - name: Wait for service state
        env:
          AIVEN_TOKEN: ${{ secrets.AIVEN_TOKEN }}
          AIVEN_PROJECT: ${{ secrets.AIVEN_PROJECT }}
          AIVEN_SERVICE: ${{ secrets.AIVEN_SERVICE }}
        run: |
          avn --auth-token "$AIVEN_TOKEN" service wait "$AIVEN_SERVICE" \
            --project "$AIVEN_PROJECT" || echo "Service is still starting"
