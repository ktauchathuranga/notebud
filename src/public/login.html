<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Login - notebud v1.0</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Inline overrides for login specific retro look */
    body { text-align: center; }
  </style>
</head>
<body>
  <div class="main-wrapper">
    <div class="topbar">
      <h1>notebud <sup>beta</sup></h1>
    </div>

    <div class="auth-container">
      <div class="auth-card">
        <center>
          <img src="https://web.archive.org/web/20091027072935/http://geocities.com/clipart/pbi/bullets/Templates/SquareBlueBullet.gif" alt="bullet">
          <h2>Member Login</h2>
          <p style="font-size: 10px;">Please enter your credentials to access the secure area.</p>
        </center>
        <hr style="border: 0; border-bottom: 1px dashed #ccc; margin: 10px 0;">
        
        <form id="loginForm">
          <table width="100%" cellpadding="5">
            <tr>
              <td align="right"><b>Username:</b></td>
              <td><input name="username" required autocomplete="username" /></td>
            </tr>
            <tr>
              <td align="right"><b>Password:</b></td>
              <td><input name="password" type="password" required autocomplete="current-password" /></td>
            </tr>
            <tr>
              <td></td>
              <td>
                <input type="checkbox" id="permanentLogin" name="permanent" />
                <label for="permanentLogin">Remember Me</label>
              </td>
            </tr>
            <tr>
              <td colspan="2" align="center">
                <div class="g-recaptcha" data-sitekey="6Ldy9LcrAAAAAAyVewti3cS2K_T6oz8ZY8dk4RHF"></div>
                <br>
                <button type="submit" id="loginBtn">>> Login <<</button>
              </td>
            </tr>
          </table>
        </form>

        <div class="auth-links" style="margin-top: 15px; font-size: 10px;">
          [ <a href="/register">Register New Account</a> ] | [ <a href="/reset-password">Lost Password?</a> ]
        </div>
        <div id="msg" class="msg"></div>
      </div>
      <br><br>
      <center>
          <small>Best viewed with Internet Explorer 6.0 at 800x600 resolution.</small>
      </center>
    </div>
  </div>

  <script>
    // Existing logic preserved
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const loginBtn = document.getElementById('loginBtn');
      const msg = document.getElementById('msg');
      msg.className = 'msg'; msg.textContent = ''; msg.style.display = 'none';
      const captchaResponse = grecaptcha.getResponse();
      if (!captchaResponse) {
        msg.className = 'msg error show';
        msg.textContent = 'Error: CAPTCHA verification failed.';
        msg.style.display = 'block';
        return;
      }
      loginBtn.disabled = true;
      loginBtn.textContent = 'Authenticating...';
      try {
        const formData = new FormData(form);
        formData.append('g-recaptcha-response', captchaResponse);
        const response = await fetch('/api/login', {
          method: 'POST',
          body: new URLSearchParams(formData)
        });
        const data = await response.json();
        grecaptcha.reset();
        if (response.ok && data.success) {
          msg.className = 'msg success show';
          msg.textContent = 'Login successful! Redirecting...';
          msg.style.display = 'block';
          form.style.display = 'none';
          setTimeout(() => { window.location.href = '/'; }, 900);
        } else {
          msg.className = 'msg error show';
          msg.textContent = data.error || 'Invalid credentials.';
          msg.style.display = 'block';
          loginBtn.disabled = false;
          loginBtn.textContent = '>> Login <<';
        }
      } catch (error) {
        msg.className = 'msg error show';
        msg.textContent = 'Connection Error.';
        msg.style.display = 'block';
        grecaptcha.reset();
        loginBtn.disabled = false;
        loginBtn.textContent = '>> Login <<';
      }
    });
  </script>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</body>
</html>
