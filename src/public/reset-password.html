<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Reset Password - notebud</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="main-wrapper">
    <div class="topbar">
      <h1>notebud <sup>beta</sup></h1>
    </div>

    <div class="auth-container">
      <div class="auth-card">
        <center>
          <h2>Password Recovery Utility</h2>
          <p style="font-size: 10px; color: #666;">Enter your username and the recovery token you were assigned.</p>
        </center>
        <hr style="border: 0; border-bottom: 1px dashed #ccc; margin: 10px 0;">
        
        <form id="resetForm">
          <table width="100%" cellpadding="5">
            <tr>
              <td align="right"><b>Username:</b></td>
              <td><input name="username" required autocomplete="username" /></td>
            </tr>
            <tr>
              <td align="right"><b>Token:</b></td>
              <td>
                <input name="refresh_token" required style="font-family: 'Courier New', monospace;" placeholder="Paste token here..." />
              </td>
            </tr>
            <tr>
              <td align="right"><b>New Pass:</b></td>
              <td><input name="new_password" type="password" required autocomplete="new-password" minlength="6" /></td>
            </tr>
            <tr>
              <td></td>
              <td><button type="submit" id="resetBtn">Reset Password</button></td>
            </tr>
          </table>
        </form>
        
        <div id="tokenDisplay" style="display: none; background: #e0ffe0; border: 1px solid green; padding: 10px; margin-top: 10px;">
          <div style="font-weight: bold; color: green;">SUCCESS!</div>
          <p style="font-size: 10px;">Password changed. Here is your NEW recovery token:</p>
          <div class="token-value" id="tokenValue" style="border: 1px inset #ccc; background: white; padding: 5px; font-family: monospace;"></div>
          <button type="button" class="btn" onclick="copyToken()">[ Copy New Token ]</button>
        </div>

        <div style="margin-top: 15px; font-size: 10px; text-align: center;">
          <a href="/login">&laquo; Back to Login</a>
        </div>
        <div id="msg" class="msg"></div>
      </div>
    </div>
  </div>

  <script>
    function copyToken() {
      const tokenValue = document.getElementById('tokenValue').textContent;
      navigator.clipboard.writeText(tokenValue).then(() => {
        alert("New token copied.");
      }).catch(() => {
        prompt("Copy new token:", tokenValue);
      });
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const resetBtn = document.getElementById('resetBtn');
      const msg = document.getElementById('msg');
      const tokenDisplay = document.getElementById('tokenDisplay');
      
      tokenDisplay.style.display = 'none';
      resetBtn.disabled = true;
      resetBtn.textContent = 'Verifying...';
      msg.className = 'msg'; msg.textContent = ''; msg.style.display = 'none';
      
      try {
        const response = await fetch('/api/reset_password', {
          method: 'POST',
          body: new URLSearchParams(new FormData(form))
        });
        const data = await response.json();
        
        if (response.ok && data.success) {
          msg.className = 'msg success show';
          msg.textContent = 'Operation Successful.';
          msg.style.display = 'block';
          
          document.getElementById('tokenValue').textContent = data.refresh_token;
          tokenDisplay.style.display = 'block';
          form.reset();
          resetBtn.textContent = 'Done';
          
          setTimeout(() => { window.location.href = '/login'; }, 10000);
        } else {
          msg.className = 'msg error show';
          msg.textContent = data.error || 'Reset failed';
          msg.style.display = 'block';
          resetBtn.disabled = false;
          resetBtn.textContent = 'Reset Password';
        }
      } catch (error) {
        msg.className = 'msg error show';
        msg.textContent = 'Connection Error.';
        msg.style.display = 'block';
        resetBtn.disabled = false;
        resetBtn.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>
